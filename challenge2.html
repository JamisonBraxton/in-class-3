<!DOCTYPE html>
<html>
<head>
    <title>Challenge 2 - I ♥ NY T-Shirt</title>

    <style>
        .container {
            position: relative;
            background-color: lightgray;
            padding: 20px;
            width: 500px;
        }

        img {
            position: relative;
            left: 10px;

            border: 4px solid black;
            padding: 10px;
            margin: 20px;

            box-shadow: 5px 5px 15px gray;
            width: 350px;
        }

        .words {
            font-family: impact;
            font-size: 60px;
        }

        .first {
            position: absolute;
            top: 120px;
            left: 180px;
            z-index: 2;
        }

        .heart {
            color: red;
            font-size: 80px;

            position: absolute;
            top: 105px;
            left: 225px;
            z-index: 2;
        }

        .last {
            position: absolute;
            top: 210px;
            left: 170px;
            z-index: 2;
        }
    </style>
</head>

<body>

    <div class="logo">
        <span class="first words">I</span>
    
        <span class="heart">&hearts;</span>
    
        <span class="last words">NY</span>
    </div>
    
    <div>
        <img src="shirt.jpg" alt="White t-shirt">
    </div>
    
</div>

</body>
</html>
